version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: object-tracker-backend
    env_file:
      - .env
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./storage/outputs:/app/storage/outputs
      - ./tracking.db:/app/tracking.db

  frontend:
    image: python:3.11-slim
    container_name: object-tracker-frontend
    working_dir: /app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && streamlit run frontend/app.py --server.port=8501 --server.address=0.0.0.0"
    env_file:
      - .env
    environment:
      - STREAMLIT_API_URL=http://backend:8000
    ports:
      - "8501:8501"
    volumes:
      - ./:/app
    depends_on:
      - backend
